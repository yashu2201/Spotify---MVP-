services:
  - type: web
    name: music-buddy-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GEMINI_API_KEY
        sync: false # Set manually in the Render dashboard
      - key: LLM_MODEL
        value: gemini-2.5-flash
      - key: FRONTEND_URL
        sync: false # e.g. https://your-app.vercel.app
    # Album art + verification use the free iTunes Search API — no keys needed.
