services:
  - type: web
    name: music-buddy-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: OPENAI_API_KEY
        sync: false # User must set this manually in the dashboard
      - key: LLM_MODEL
        value: gpt-4o-mini
